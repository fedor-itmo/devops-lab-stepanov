name: Docker Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/my-flask-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/my-flask-app:buildcache,mode=max
      
      - name: Deploy step
        run: |
          echo "Deploying ${{ secrets.DOCKER_USERNAME }}/my-flask-app:latest"
          echo "Deployment completed successfully!"
          echo "Application is now available at: http://your-server:5000"
